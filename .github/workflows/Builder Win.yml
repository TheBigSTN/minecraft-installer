name: App Builder (Velopack)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            exe: ModpackInstaller.Desktop.exe
            artifact: windows
          - os: ubuntu-latest
            rid: linux-x64
            exe: ModpackInstaller.Desktop
            artifact: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    env:
      Project_Path: ModpackInstaller.Desktop/ModpackInstaller.Desktop.csproj
      App_Id: ModpackInstaller

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish app
        run: |
          dotnet publish ${{ env.Project_Path }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -o ./publish

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        run: |
          vpk pack \
            -u ${{ env.App_Id }} \
            -v ${{ steps.version.outputs.PROJECT_VERSION }} \
            -p ./publish \
            -e ${{ matrix.exe }} \
            --outputDir ./releases

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.artifact }}
          path: releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: releases-*
          merge-multiple: true

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Folosim gh release create pentru a fi mai siguri, 
          # dar dacă vrei vpk upload, lista de fișiere trebuie să fie corectă
          vpk upload github \
            --repoUrl https://github.com/${{ github.repository }} \
            --publish \
            --releaseName "Release $VERSION" \
            --tag "$GITHUB_REF_NAME" \
            --token "$GITHUB_TOKEN" \
            --assets "artifacts/*"
