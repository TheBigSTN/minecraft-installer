name: App Builder Win (Velopack)

on:
  push:
    branches: [main, workflows]
  pull_request:
    branches: [main, workflows]

# Permisiuni necesare pentru ca Velopack să poată crea Release-uri
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      Project_Path: ModpackInstaller.Desktop/ModpackInstaller.Desktop.csproj
      # ID-ul unic al aplicației tale (folosit pentru calea de instalare)
      App_Id: ModpackInstaller

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pentru Velopack să vadă tag-urile

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Get Project Version
        id: get_version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content ${{ env.Project_Path }}
          $v = $proj.Project.PropertyGroup.Version
          echo "PROJECT_VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Publish application
        run: |
          dotnet publish ${{ env.Project_Path }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./publish

      - name: Create & Upload Velopack Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Instalare tool Velopack
          dotnet tool install -g vpk

          # 2. Descarcă release-ul anterior pentru a genera "Delta Updates" (update-uri mici)
          # Dacă e primul release, comanda va ignora eroarea sau va descărca ce găsește
          vpk download github --repoUrl https://github.com/${{ github.repository }}

          # 3. Impachetează aplicația
          # -u: ID-ul aplicației
          # -v: Versiunea extrasă din csproj
          # -p: Folderul unde am făcut publish mai sus
          # -e: Numele executabilului principal
          vpk pack -u ${{ env.App_Id }} `
                   -v ${{ steps.get_version.outputs.PROJECT_VERSION }} `
                   -p ./publish `
                   -e ModpackInstaller.Desktop.exe

          # 4. Upload pe GitHub Releases
          # --publish: Face release-ul public imediat
          vpk upload github --repoUrl https://github.com/${{ github.repository }} `
                            --publish `
                            --releaseName "Release v${{ steps.get_version.outputs.PROJECT_VERSION }}" `
                            --tag v${{ steps.get_version.outputs.PROJECT_VERSION }} `
                            --token ${{ secrets.GITHUB_TOKEN }}
