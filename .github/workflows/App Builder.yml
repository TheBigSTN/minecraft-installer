name: App Builder

on:
  push:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Project Version
        id: get_version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content ModpackInstaller.Desktop/ModpackInstaller.Desktop.csproj
          $v = $proj.Project.PropertyGroup.Version
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          echo "Checking version v$VERSION"

          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION)

          if [ "$code" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
  build:
    needs: check_version
    if: needs.check_version.outputs.exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            exe: ModpackInstaller.Desktop.exe
          - os: ubuntu-latest
            rid: linux-x64
            exe: ModpackInstaller.Desktop
    
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    env:
      Project_Path: ModpackInstaller.Desktop/ModpackInstaller.Desktop.csproj
      App_Id: ModpackInstaller

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish app
        run: |
          dotnet publish ${{ env.Project_Path }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -o ./publish

      - name: Get Project Version
        id: get_version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content ${{ env.Project_Path }}
          $v = $proj.Project.PropertyGroup.Version
          echo "PROJECT_VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Pack and Upload directly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.PROJECT_VERSION }}
        run: |
          echo "Building version $VERSION"

          # 1. Descarcă release-ul anterior (pentru a genera Delta Updates)
          # Dacă e prima versiune, vpk va ignora automat lipsa release-urilor vechi
          vpk download github \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "$GITHUB_TOKEN" \
            --outputDir ./releases || echo "Nu s-au găsit release-uri anterioare, se creează release-ul inițial."

          # 2. Impachetare (acum că are acces la versiunile vechi, va genera și patch-uri)
          vpk pack -u ${{ env.App_Id }} \
                   -v "v$VERSION" \
                   -p ./publish \
                   -e ${{ matrix.exe }} \
                   --outputDir ./releases

      - name: Rename Output if linux
        if: runner.os == 'Linux'
        run: |
          cp -r ./releases ./Releases

      - name: Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.PROJECT_VERSION }}
        run: |
          vpk upload github \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --publish \
            --releaseName "Release v$VERSION" \
            --tag "v$VERSION" \
            --token "$GITHUB_TOKEN" \
            --merge
